<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#3498db"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Terminal bracket left -->
  <path d="M120 180 L180 256 L120 332" stroke="url(#accent)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Terminal bracket right -->
  <path d="M392 180 L332 256 L392 332" stroke="url(#accent)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Center nodes (agents) -->
  <circle cx="220" cy="220" r="18" fill="#4ecdc4" opacity="0.9"/>
  <circle cx="292" cy="220" r="18" fill="#3498db" opacity="0.9"/>
  <circle cx="256" cy="292" r="18" fill="#9b59b6" opacity="0.9"/>
  <!-- Connection lines between nodes -->
  <line x1="235" y1="228" x2="277" y2="228" stroke="#fff" stroke-width="3" opacity="0.4"/>
  <line x1="227" y1="235" x2="249" y2="278" stroke="#fff" stroke-width="3" opacity="0.4"/>
  <line x1="285" y1="235" x2="263" y2="278" stroke="#fff" stroke-width="3" opacity="0.4"/>
  <!-- D letter subtle -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="64" fill="#fff" opacity="0.7">D</text>
</svg>
